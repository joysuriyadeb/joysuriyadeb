<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Whisper Wall ⚡</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--primary:#00ff88;
--secondary:#00c3ff;
--danger:#ff0066;
--bg:#050816;
--card:#111827;
--text:#ffffff;
--muted:#9ca3af;
}
body{
background:linear-gradient(135deg,#050816,#0f172a);
color:var(--text);
font-family:Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
}
.container{max-width:900px;margin:auto;padding:20px;position:relative;z-index:2;}
.logo{text-align:center;font-size:42px;color:var(--primary);margin:20px 0;}
.tagline{text-align:center;color:var(--muted);margin-bottom:20px;}

.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.search{flex:1;}
.search input{width:100%;padding:12px;border-radius:10px;border:none;background:#111827;color:#fff;}

.btn{padding:10px 15px;border:none;border-radius:10px;cursor:pointer;}
.btn-primary{background:var(--primary);}
.btn-secondary{background:var(--secondary);}

.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}
.filter{padding:6px 12px;background:#111827;border-radius:20px;cursor:pointer;}
.filter.active{background:var(--primary);color:#000;}

.input-box{background:#111827;padding:15px;border-radius:15px;margin-bottom:20px;}
textarea{width:100%;min-height:100px;background:transparent;color:#fff;border:none;outline:none;}

.card{background:#111827;padding:15px;border-radius:15px;margin-bottom:15px;}
.card-top{display:flex;justify-content:space-between;margin-bottom:10px;}
.badge{color:var(--primary);}
.time{color:var(--muted);}
.message{margin:10px 0;}

.action{padding:8px 10px;border:none;border-radius:8px;cursor:pointer;}
.like.active{background:var(--primary);color:#000;}
.delete{background:var(--danger);}

/* ===== LOGIN MODAL ===== */
#authBox{
position:fixed;inset:0;
background:rgba(0,0,0,0.85);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
.auth-card{
background:#111827;
padding:20px;
border-radius:12px;
width:300px;
text-align:center;
}
.auth-card input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}
.auth-card button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
}
.login{background:var(--primary);}
.signup{background:var(--secondary);}
</style>
</head>

<body>

<!-- 🔐 LOGIN UI -->
<div id="authBox">
  <div class="auth-card">
    <h2 style="color:#00ff88;">Whisper Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="login" onclick="login()">Login</button>
    <button class="signup" onclick="signup()">Signup</button>

    <p id="authMsg" style="color:red;font-size:12px;margin-top:10px;"></p>
  </div>
</div>

<div class="container">

<div class="logo">⚡ WHISPER WALL ⚡</div>
<div class="tagline">Anonymous Messages | Firebase Secure</div>

<div class="topbar">
<div class="search">
<input id="searchInput" placeholder="Search..." oninput="render()">
</div>
<button class="btn btn-primary">Latest</button>
</div>

<div class="filters" id="filters"></div>

<div class="input-box">
<textarea id="messageInput" placeholder="Write message..."></textarea>
<button class="btn btn-primary" onclick="sendMessage()">Send</button>
</div>

<div id="messageList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getDatabase, ref, push, onValue, remove, update
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const refMsg = ref(db,"whispers");

let user = null;
let messages = [];

/* ===== AUTH STATE ===== */
onAuthStateChanged(auth,(u)=>{
user = u;
document.getElementById("authBox").style.display = u ? "none":"flex";
});

/* ===== LOGIN ===== */
window.login = function(){
const email = emailInput.value;
const pass = password.value;

signInWithEmailAndPassword(auth,email,pass)
.catch(e=>authMsg.innerText=e.message);
}

/* ===== SIGNUP ===== */
window.signup = function(){
const email = emailInput.value;
const pass = password.value;

createUserWithEmailAndPassword(auth,email,pass)
.catch(e=>authMsg.innerText=e.message);
}

/* ===== SEND MESSAGE ===== */
window.sendMessage = async function(){
if(!user){alert("Login first");return;}

const text = messageInput.value.trim();
if(!text)return;

await push(refMsg,{
text,
uid:user.uid,
time:Date.now(),
likes:0
});

messageInput.value="";
}

/* ===== LOAD ===== */
onValue(refMsg,(snap)=>{
messages = [];
snap.forEach(s=>{
messages.push({id:s.key,...s.val()});
});
render();
});

/* ===== RENDER ===== */
window.render = function(){
messageList.innerHTML = messages.map(m=>`
<div class="card">
<div class="card-top">
<span class="badge">User</span>
<span class="time">${new Date(m.time).toLocaleString()}</span>
</div>
<div class="message">${m.text}</div>
</div>
`).join("");
};
</script>

</body>
</html>
