<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whisper Wall ⚡</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
:root{
--primary:#00ff88;
--secondary:#00c3ff;
--danger:#ff0066;
--bg:#050816;
--card:#111827;
--text:#ffffff;
--muted:#9ca3af;
}
body{
background:linear-gradient(135deg,#050816,#0f172a);
color:var(--text);
font-family:Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
}
body::after {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image:
radial-gradient(2px 2px at 20px 30px, rgba(0, 255, 65, 0.3), rgba(0, 255, 65, 0)),
radial-gradient(2px 2px at 60px 70px, rgba(0, 217, 255, 0.3), rgba(0, 217, 255, 0)),
radial-gradient(1px 1px at 50px 50px, rgba(255, 0, 110, 0.3), rgba(255, 0, 110, 0)),
radial-gradient(1px 1px at 130px 80px, rgba(0, 255, 65, 0.2), rgba(0, 255, 65, 0)),
radial-gradient(2px 2px at 90px 10px, rgba(0, 217, 255, 0.3), rgba(0, 217, 255, 0));
background-repeat: repeat;
background-size: 200px 200px;
animation: particleFloat 15s ease-in-out infinite;
pointer-events: none;
z-index: 1;
}
@keyframes particleFloat {
0%, 100% { transform: translateY(0px); }
50% { transform: translateY(-20px); }
}
.container{
position: relative;
z-index: 2;
width:100%;
max-width:900px;
margin:auto;
padding:20px;
}
.logo{
text-align:center;
font-size:42px;
font-weight:bold;
margin:20px 0;
color:var(--primary);
text-shadow:0 0 20px rgba(0,255,136,.6);
animation: neon-flicker 3s infinite;
}
@keyframes neon-flicker {
0%, 100% { opacity: 1; }
50% { opacity: 0.95; }
}
.tagline {
text-align: center;
color: var(--muted);
font-size: 14px;
margin-top: -10px;
margin-bottom: 20px;
letter-spacing: 1px;
}
.topbar{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}
.search{
flex:1;
}
.search input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#111827;
color:white;
font-size:15px;
outline:none;
border:2px solid transparent;
}
.search input:focus{
border-color:var(--secondary);
box-shadow:0 0 15px rgba(0,195,255,.4);
}
.btn{
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}
.btn-primary{
background:var(--primary);
color:black;
}
.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(0,255,136,.6);
}
.btn-secondary{
background:var(--secondary);
color:black;
}
.btn-secondary:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(0,195,255,.6);
}
.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}
.filter{
padding:8px 14px;
border-radius:50px;
background:#111827;
cursor:pointer;
border:1px solid #1f2937;
transition:.3s;
font-size:13px;
}
.filter.active{
background:var(--primary);
color:black;
}
.filter:hover{
border-color:var(--primary);
}
.input-box{
background:rgba(17,24,39,.95);
padding:20px;
border-radius:16px;
margin-bottom:25px;
border:1px solid #1f2937;
transition: all 0.3s ease;
}
.input-box:focus-within {
border-color: var(--primary);
box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
}
textarea{
width:100%;
min-height:100px;
resize:none;
border:none;
outline:none;
background:transparent;
color:white;
font-size:15px;
}
textarea::placeholder {
color: var(--muted);
}
.bottom-controls{
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}
select{
background:#0f172a;
color:white;
border:1px solid #1f2937;
padding:10px;
border-radius:8px;
cursor: pointer;
}
select:hover {
border-color: var(--primary);
}
.char-count{
color:var(--muted);
font-size: 13px;
}
.message-list{
display:flex;
flex-direction:column;
gap:20px;
}
.card{
background:rgba(17,24,39,.95);
border-radius:16px;
padding:20px;
border:1px solid #1f2937;
animation:fade .3s ease;
transition: all 0.3s ease;
}
.card:hover {
border-color: var(--primary);
box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
transform: translateY(-3px);
}
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}
.card-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}
.badge{
background:rgba(0,255,136,.15);
color:var(--primary);
padding:6px 12px;
border-radius:50px;
font-size:12px;
font-weight: bold;
letter-spacing: 0.5px;
}
.time{
color:var(--muted);
font-size:12px;
}
.message{
line-height:1.7;
word-break:break-word;
color: var(--text);
}
.card-bottom{
margin-top:20px;
display:flex;
gap:10px;
}
.action{
border:none;
background:#0f172a;
color:white;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
transition:.3s;
font-size: 13px;
}
.action:hover{
transform:scale(1.05);
}
.like.active{
background:var(--primary);
color:black;
}
.delete{
background:var(--danger);
}
.delete:hover {
box-shadow: 0 0 15px rgba(255, 0, 102, 0.5);
}
.empty{
text-align:center;
padding:70px 20px;
color:var(--muted);
}
.empty h2 {
margin-bottom: 10px;
font-size: 28px;
}
.sync{
text-align:right;
margin-bottom:10px;
color:var(--primary);
font-size:13px;
}
.private-notice {
background: rgba(0, 255, 136, 0.1);
border: 1px solid var(--primary);
border-radius: 10px;
padding: 15px;
margin-bottom: 20px;
text-align: center;
color: var(--primary);
font-size: 13px;
}
.private-notice i {
margin-right: 8px;
}
@media(max-width:700px){
.logo{
font-size:30px;
}
.bottom-controls{
flex-direction:column;
align-items:stretch;
}
}
</style>
</head>
<body>
<div class="container">
<div class="logo">
⚡ WHISPER WALL ⚡
</div>
<div class="tagline">
Anonymous Messages | Real Time Sync
</div>

<div class="private-notice">
<i class="fas fa-lock"></i>
<strong>Private Mode:</strong> Only you can see your messages
</div>

<div class="sync" id="syncStatus">
📡 Synced
</div>

<div class="topbar">
<div class="search">
<input
type="text"
id="searchInput"
placeholder="🔍 Search messages..."
oninput="filterMessages()"
>
</div>
<button class="btn btn-primary" onclick="sortLatest()">
📅 Latest
</button>
<button class="btn btn-secondary" onclick="sortTrending()">
🔥 Trending
</button>
</div>

<div class="filters" id="filters"></div>

<div class="input-box">
<textarea
id="messageInput"
maxlength="500"
placeholder="✍️ Write your anonymous whisper..."
oninput="updateCount()"
></textarea>
<div class="bottom-controls">
<select id="category">
<option>📌 General</option>
<option>❓ Question</option>
<option>📖 Story</option>
<option>✨ Quote</option>
<option>🎲 Random</option>
<option>🎵 Music</option>
<option>💡 Advice</option>
</select>
<div class="char-count">
<span id="count">0</span>/500
</div>
<button class="btn btn-primary" onclick="sendMessage()">
📤 SEND
</button>
</div>
</div>

<div class="message-list" id="messageList">
<div class="empty">
<h2>📭 No Whispers Yet</h2>
<p style="color: var(--muted); margin-top: 10px;">
Be the first to share something on the wall
</p>
</div>
</div>
</div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove,
  update
}
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfnDGzS2QJyWDNPQl2LuO--GOxPAf7uxQ",
  authDomain: "personal-message-379b4.firebaseapp.com",
  databaseURL: "https://personal-message-379b4-default-rtdb.firebaseio.com",
  projectId: "personal-message-379b4",
  storageBucket: "personal-message-379b4.appspot.com",
  messagingSenderId: "861066018093",
  appId: "1:861066018093:web:8ae48c3f9d5e9b3223a7a4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db,"whispers");

let messages = [];
let currentFilter = "All";
let currentSort = "latest";

// ✨ Generate or get unique user ID
function getUserId() {
  let userId = localStorage.getItem('whisper_user_id');
  if (!userId) {
    userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('whisper_user_id', userId);
    console.log('🆔 New User ID created:', userId);
  }
  return userId;
}

const myUserId = getUserId();
console.log('👤 Current User ID:', myUserId);

const categories = [
  "All",
  "📌 General",
  "❓ Question",
  "📖 Story",
  "✨ Quote",
  "🎲 Random",
  "🎵 Music",
  "💡 Advice"
];

createFilters();

// ✨ Load only user's own messages
onValue(messagesRef,(snapshot)=>{
  const data = snapshot.val();
  if(data){
    messages = Object.entries(data)
      .map(([id,val])=>({
        id,
        ...val
      }))
      .filter(msg => msg.userId === myUserId); // ✨ Only own messages
    
    console.log('📬 Loaded', messages.length, 'messages');
  }else{
    messages = [];
  }
  render();
});

window.sendMessage = async function(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  const category = document.getElementById("category").value;
  
  if(!text) {
    alert('⚠️ Please write something!');
    return;
  }
  
  setStatus("📤 Sending...");
  
  try {
    await push(messagesRef,{
      text,
      category,
      userId: myUserId, // ✨ Add user ID
      likes:0,
      liked:false,
      created:Date.now(),
      time:new Date().toLocaleString()
    });
    
    input.value = "";
    updateCount();
    setStatus("✓ Sent!");
    setTimeout(() => setStatus("📡 Synced"), 2000);
  } catch(error) {
    console.error('Error sending message:', error);
    setStatus("❌ Error!");
    alert('Failed to send message. Check Firebase rules.');
  }
};

window.likeMessage = async function(id){
  const msg = messages.find(m=>m.id===id);
  if(!msg) return;
  
  const liked = !msg.liked;
  const likes = liked
    ? (msg.likes||0)+1
    : Math.max((msg.likes||0)-1,0);
  
  await update(ref(db,"whispers/"+id),{
    liked,
    likes
  });
};

window.deleteMessage = async function(id){
  if(!confirm("🗑️ Delete this whisper?")) return;
  
  setStatus("🗑️ Deleting...");
  
  try {
    await remove(ref(db,"whispers/"+id));
    setStatus("✓ Deleted!");
    setTimeout(() => setStatus("📡 Synced"), 2000);
  } catch(error) {
    console.error('Error deleting:', error);
    setStatus("❌ Error!");
  }
};

window.filterMessages = function(){
  render();
};

window.sortLatest = function(){
  currentSort = "latest";
  render();
};

window.sortTrending = function(){
  currentSort = "trending";
  render();
};

function render(){
  const container = document.getElementById("messageList");
  const search = document.getElementById("searchInput")
    .value
    .toLowerCase();
  
  let filtered = messages.filter(m=>{
    const searchMatch = m.text.toLowerCase().includes(search);
    const categoryMatch = currentFilter==="All" || m.category===currentFilter;
    return searchMatch && categoryMatch;
  });
  
  if(currentSort==="latest"){
    filtered.sort((a,b)=>b.created-a.created);
  }else{
    filtered.sort((a,b)=>(b.likes||0)-(a.likes||0));
  }
  
  if(filtered.length===0){
    container.innerHTML = `
      <div class="empty">
        <h2>📭 No Whispers Yet</h2>
        <p style="color: var(--muted); margin-top: 10px;">
          Be the first to share something on the wall
        </p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = filtered.map(msg=>`
    <div class="card">
      <div class="card-top">
        <div class="badge">
          ${escapeHTML(msg.category)}
        </div>
        <div class="time">
          ${msg.time}
        </div>
      </div>
      <div class="message">
        ${escapeHTML(msg.text)}
      </div>
      <div class="card-bottom">
        <button
          class="action like ${msg.liked ? 'active':''}"
          onclick="likeMessage('${msg.id}')"
        >
          ❤️ ${msg.likes||0}
        </button>
        <button
          class="action delete"
          onclick="deleteMessage('${msg.id}')"
        >
          🗑️ Delete
        </button>
      </div>
    </div>
  `).join("");
}

function createFilters(){
  const wrap = document.getElementById("filters");
  wrap.innerHTML = categories.map(cat=>`
    <div
      class="filter ${cat==="All" ? "active":""}"
      onclick="setFilter('${cat}',this)"
    >
      ${cat}
    </div>
  `).join("");
}

window.setFilter = function(category,el){
  currentFilter = category;
  document.querySelectorAll(".filter")
    .forEach(f=>f.classList.remove("active"));
  el.classList.add("active");
  render();
};

window.updateCount = function(){
  document.getElementById("count")
    .innerText = document.getElementById("messageInput")
    .value.length;
};

function escapeHTML(text){
  const div = document.createElement("div");
  div.innerText = text;
  return div.innerHTML;
}

function setStatus(text){
  document.getElementById("syncStatus")
    .innerText = text;
}
</script>
</body>
</html>
